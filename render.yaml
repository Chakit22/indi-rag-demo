services:
  - type: web
    name: indi-rag-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: "pip install -r requirements.txt && python -m app.scripts.ingest"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: EMBED_MODEL
        value: text-embedding-3-small
      - key: LLM_MODEL
        value: gpt-4o-mini
      - key: CHROMA_PATH
        value: ./chroma_db
      - key: PYTHON_VERSION
        value: 3.11.9
    healthCheckPath: /health
